<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0D17"/>
      <stop offset="100%" stop-color="#1A1C29"/>
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/> <!-- Emerald 500 -->
      <stop offset="50%" stop-color="#3B82F6"/> <!-- Blue 500 -->
      <stop offset="100%" stop-color="#8B5CF6"/> <!-- Violet 500 -->
    </linearGradient>

    <!-- Edge Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" rx="12" fill="url(#bg)"/>

  <!-- Subtle Grid -->
  <g stroke="#2D3748" stroke-width="0.5" opacity="0.3">
    <path d="M0,50 h800 M0,100 h800 M0,150 h800 M0,200 h800"/>
    <path d="M100,0 v250 M200,0 v250 M300,0 v250 M400,0 v250 M500,0 v250 M600,0 v250 M700,0 v250"/>
  </g>

  <!-- Left Side: Abstract Neural Net / Edge Graph -->
  <g transform="translate(40, 20)">
    <!-- Connections -->
    <g stroke="#4B5563" stroke-width="2" stroke-linecap="round">
      <!-- Input to hidden -->
      <line x1="40" y1="60" x2="120" y2="105" stroke="#3B82F6" opacity="0.8"/>
      <line x1="40" y1="150" x2="120" y2="105" stroke="#10B981" opacity="0.8"/>
      
      <!-- Hidden to output -->
      <line x1="120" y1="105" x2="200" y2="60" stroke="#EF4444" opacity="0.4" stroke-dasharray="4"/>
      <line x1="120" y1="105" x2="200" y2="150" stroke="#3B82F6" opacity="0.8"/>
    </g>

    <!-- Weights (Ternary labels) -->
    <g fill="#F8FAFC" font-family="monospace" font-size="12" font-weight="700">
      <rect x="70" y="70" width="20" height="16" rx="4" fill="#1E293B" style="transform: rotate(29deg); transform-origin: 80px 78px;" />
      <text x="80" y="82" fill="#60A5FA" text-anchor="middle" style="transform: rotate(29deg); transform-origin: 80px 78px;">+1</text>
      
      <rect x="70" y="125" width="20" height="16" rx="4" fill="#1E293B" style="transform: rotate(-29deg); transform-origin: 80px 133px;"/>
      <text x="80" y="137" fill="#34D399" text-anchor="middle" style="transform: rotate(-29deg); transform-origin: 80px 133px;">-1</text>
      
      <rect x="150" y="70" width="20" height="16" rx="4" fill="#1E293B" style="transform: rotate(-29deg); transform-origin: 160px 78px;"/>
      <text x="160" y="82" fill="#9CA3AF" text-anchor="middle" style="transform: rotate(-29deg); transform-origin: 160px 78px;">0</text>
      
      <rect x="150" y="125" width="20" height="16" rx="4" fill="#1E293B" style="transform: rotate(29deg); transform-origin: 160px 133px;"/>
      <text x="160" y="137" fill="#60A5FA" text-anchor="middle" style="transform: rotate(29deg); transform-origin: 160px 133px;">+1</text>
    </g>

    <!-- Nodes -->
    <g stroke="#0F172A" stroke-width="4">
      <circle cx="40" cy="60" r="14" fill="#3B82F6"/>
      <circle cx="40" cy="150" r="14" fill="#6366F1"/>
      <circle cx="120" cy="105" r="16" fill="#10B981" filter="url(#glow)"/>
      <circle cx="200" cy="60" r="14" fill="#4B5563"/>
      <circle cx="200" cy="150" r="14" fill="#8B5CF6"/>
    </g>
  </g>

  <!-- Typography -->
  <g transform="translate(290, 115)">
    <text x="0" y="0" fill="url(#textGrad)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5">bitnet-edge</text>
    
    <text x="5" y="35" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="0.5">TERNARY-WEIGHT CNN · MULTIPLY-FREE INFERENCE</text>
    
    <!-- W ∈ {-1, 0, 1} badge -->
    <g transform="translate(5, 60)">
      <rect x="0" y="-18" width="130" height="26" rx="6" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.3)"/>
      <text x="65" y="1" fill="#60A5FA" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="700" text-anchor="middle">w ∈ {-1, 0, 1}</text>
    </g>
    
    <g transform="translate(145, 60)">
      <rect x="0" y="-18" width="120" height="26" rx="6" fill="rgba(16, 185, 129, 0.1)" stroke="rgba(16, 185, 129, 0.3)"/>
      <text x="60" y="1" fill="#34D399" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="700" text-anchor="middle">y += x, y -= x</text>
    </g>
  </g>

  <!-- Edge Device Symbol -->
  <g transform="translate(680, 100)" stroke="#64748B" stroke-width="2" stroke-linecap="round">
    <rect x="-30" y="-30" width="60" height="60" rx="8" fill="#1E293B" stroke="#475569"/>
    
    <!-- Chip pins -->
    <path d="M-30 -15 h-8 M-30 0 h-8 M-30 15 h-8" />
    <path d="M30 -15 h8 M30 0 h8 M30 15 h8" />
    <path d="M-15 -30 v-8 M0 -30 v-8 M15 -30 v-8" />
    <path d="M-15 30 v8 M0 30 v8 M15 30 v8" />
    
    <!-- Microcontroller text -->
    <text x="0" y="4" fill="#94A3B8" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" text-anchor="middle" stroke="none">MCU</text>
  </g>
</svg>
